<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="index" href="index.html">
    <link rel="stylesheet" href="../Frontend/css/cad.css">
    <link rel="icon" href="../Frontend/imagem/A.ico.ico" type="image.x/icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Cadastro</title>
</head>

<body>

    <main class="container">

        <h1>Cadastro</h1>

        <form action="">
            <div class="container-input"></div>
            <div class="input-box name">
                <label for="firstname">Primeiro Nome</label>
                <input type="text" name="firstname" id="firstname" placeholder="Digite seu Nome">
                <i class="bx bxs-user"></i>
                </div>
            </div>

            <div class="input-box">
                <label for="lastname">Sobrenome</label>
                <input type="text" name="lastname" id="lastname" placeholder="Digite seu Sobrenome">
                <i class="bx bxs-user"></i>
                </div>
            </div>

            <div class="input-box data">
                <label for="birthdate">Data de Nascimento</label>
                <input type="date" name="birthdate" id="birthdate" >
            </div>

            <div class="input-box">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="e-mail" placeholder="Digite seu E-mail">
                <i class="bx bxs-envelope"></i>
            </div>

            <div class="input-box tel">
                <label for="tel">Telefone</label>
                <input type="tel" name="number" id="number" placeholder="(xx) xxxx-xxxx">
                <i class="bx bxs-phone"></i>
            </div>

            <div class="input-box input">
                <label for="password">Senha</label>
                <input type="password" name="password" id="password" placeholder="Digite sua Senha">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="input-box confirm">
                <label for="password"> Confirme sua Senha</label>
                <input type="password" name="confirmpassword" id="confirmpassword"
                    placeholder="Digite sua Senha novamente">
                    <i class="bx bxs-lock-alt"></i>
            </div>
            </div>

            <div class="gender-input">
                <div class="gender-title">
                    <h5>Gênero</h5>
                </div>
            </div>
            <div class="gender-group">
                <div class="gender-input">
                    <input type="radio" id="famele" name="gender">
                    <label for="famele">Feminino </label>
                </div>
                <div class="gender-input">
                    <input type="radio" id="male" name="gender">
                    <label for="male">Masculino </label>
                </div>
                <div class="gender-input">
                    <input type="radio" id="others" name="gender">
                    <label for="others">Outros </label>
                </div>
                <div class="gender-input">
                    <input type="radio" id="none" name="gender">
                    <label for="none">Prefiro não dizer </label>
                </div>
            </div>
            </div>

            <button type="submit" class="Entrar">Entrar </button>
            
            <p>Já tenho uma Conta? <a href="http://127.0.0.1:5500/Frontend/index.html">Entrar</a></p>



        </form>
    </main>

</body>

</html>

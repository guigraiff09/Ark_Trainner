<!DOCTYPE HTML>

<html lang="pt-br">

<head>
    <meta charset="UTF_8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="style" href="LOGIN-FUNDO.png">
    <link rel="img.png" href="fundo-cinza (1).png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>DIGITAL ARK</title>
</head>

<body>
    <main class="container">

        <form>
            <h1>Login ARK TRAINNER</h1>

            <label>
                <div class="input-box">
                    <input placeholder="Usuário" type="email">
                    <i class="bx bxs-user"></i>
                </div>
            </label>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgote">
                <label>
                    <input type="checkbox" style="cursor: pointer;">
                    Lembrar Senha
                </label>
                <a href="#">Esqueci minha senha</a>
            </div>

            <button type="submit" class="Entrar">Entrar</button>


            <div class="register-link">
                <p>Não tem uma conta?</p> <a href="#">Cadastre-se</a>
            </div>


        </form>

    </main>

</body>

</html>
